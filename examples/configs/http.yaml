engine: http
targets:
  - url: http://localhost:8081/api/taiko?id={{id}}
    method: POST
    timeout: 5s
    body: '{}'
    headers:
      Content-Type: application/json
    rps: 1500
load:
  duration: 1m
metrics:
  type: console
variables:
  - name: id
    type: uuid

