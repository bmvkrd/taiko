engine: kafka
targets:
  - brokers: ["localhost:9092"]
    topic: raw-events
    key: "{{event_id}}"
    value: '{"id": "{{event_id}}", "count": {{count}}}'
    rps: 1000
    value_schema:
      file: "/etc/taiko/schemas/event.avsc"
load:
  duration: 30s
variables:
  - name: event_id
    type: uuid
  - name: count
    type: int_range
    generator: { mode: rnd, min: 1, max: 100 }