engine: grpc
targets:
  - endpoint: localhost:9090
    service: taiko.TaikoService
    method: Taiko
    proto_files:
      - examples/taiko.proto
    payload: '{"message": "{{user_id}}"}'
    metadata:
      x-request-id: "{{uuid}}"
    rps: 10
    timeout: 5s
load:
  duration: 60s
variables:
  - name: user_id
    type: uuid

